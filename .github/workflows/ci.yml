name: CI

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: PHP syntax check
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

  package:
    needs: php-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and validate installable ZIP
        run: bash scripts/build-zip.sh
      - uses: actions/upload-artifact@v7
        with:
          name: wp-ds-aichatbot-${{ github.sha }}
          path: dist/wp-ds-aichatbot.zip
          if-no-files-found: error
          retention-days: 14
