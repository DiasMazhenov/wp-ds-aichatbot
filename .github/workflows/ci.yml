name: CI

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: PHP syntax check
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install test runtime
        run: npm ci
      - name: Install production PHP runtime
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist
      - name: WordPress core smoke test
        run: npm run test:integration
      - name: Elementor widget smoke test
        run: npm run test:elementor

  coding-standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install coding standards
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: WordPress Coding Standards
        run: composer lint

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.3']
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
      - name: Install test dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPUnit
        run: composer test:unit

  package:
    needs:
      - php-lint
      - integration
      - coding-standards
      - unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Build and validate installable ZIP
        run: bash scripts/build-zip.sh
      - uses: actions/upload-artifact@v7
        with:
          name: wp-ds-aichatbot-${{ github.sha }}
          path: dist/wp-ds-aichatbot.zip
          if-no-files-found: error
          retention-days: 14
